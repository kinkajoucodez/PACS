services:
  postgres:
    image: postgres:16
    container_name: pacs-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres_password}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql:ro
    networks:
      - pacs-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres}']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  orthanc:
    image: orthancteam/orthanc
    container_name: pacs-orthanc
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '${ORTHANC_DICOM_PORT:-4242}:4242'
      - '${ORTHANC_HTTP_PORT:-8042}:8042'
    volumes:
      - ./docker/orthanc/orthanc.json:/etc/orthanc/orthanc.json:ro
      - ./docker/orthanc/webhook.lua:/etc/orthanc/webhook.lua:ro
      - orthanc-data:/var/lib/orthanc/db
    networks:
      - pacs-network
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: pacs-keycloak
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-keycloak_admin_password}
      KC_DB: ${KC_DB:-postgres}
      KC_DB_URL: ${KC_DB_URL:-jdbc:postgresql://postgres:5432/keycloak}
      KC_DB_USERNAME: ${POSTGRES_USER:-postgres}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres_password}
    ports:
      - '8080:8080'
    volumes:
      - ./docker/keycloak/pacs-realm.json:/opt/keycloak/data/import/pacs-realm.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - pacs-network
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pacs-backend
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres_password}@postgres:5432/pacs_platform?schema=public
      KEYCLOAK_REALM: pacs
      KEYCLOAK_AUTH_SERVER_URL: http://keycloak:8080
      KEYCLOAK_CLIENT_ID: pacs-viewer
      KEYCLOAK_JWKS_URI: http://keycloak:8080/realms/pacs/protocol/openid-connect/certs
      ORTHANC_URL: http://orthanc:8042
      CORS_ORIGINS: http://localhost,http://localhost:3000,http://nginx
    ports:
      - '${BACKEND_PORT:-3001}:3001'
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
    networks:
      - pacs-network
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://localhost:3001/api/health']
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  ohif:
    build:
      context: .
      dockerfile: docker/ohif/Dockerfile
    container_name: pacs-ohif
    ports:
      - '${OHIF_PORT:-3000}:3000'
    depends_on:
      - orthanc
    networks:
      - pacs-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: pacs-nginx
    ports:
      - '${NGINX_PORT:-80}:80'
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - ohif
      - orthanc
      - keycloak
      - backend
    networks:
      - pacs-network
    restart: unless-stopped

networks:
  pacs-network:
    driver: bridge

volumes:
  postgres-data:
  orthanc-data:
